version: "3.9"

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: itbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-simpassword}
      POSTGRES_DB: itbot_kb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # localhost only — not exposed to network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itbot -d itbot_kb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"   # localhost only — put behind reverse proxy
    depends_on:
      postgres:
        condition: service_healthy

  # Streamlit frontend
  frontend:
    build: .
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "127.0.0.1:8501:8501"   # localhost only — put behind reverse proxy
    depends_on:
      - api

volumes:
  pgdata:
